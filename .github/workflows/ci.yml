
name: Web App Terminal CI

# This triggers the action whenever you push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up the environment (Node.js in this case)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Update this to your preferred Node version

      # Step 3: Install your project dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run tests (if you have them)
      - name: Run tests
        run: npm test --if-present

      # Step 5: Build the web app
      - name: Build app
        run: npm run build --if-present
        
